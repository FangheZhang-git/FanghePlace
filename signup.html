<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/signup.css">
    <title>Signup</title>
</head>

<body>
    <form id="signupForm">
    <h2>Sign Up</h2>

    <input type="email" class="signupGroup" id="email" placeholder="Enter email" required />
    <br><br>

    <input type="password" class="signupGroup" id="password" placeholder="Enter password" required />
    <br><br>

    <button type="submit">Create Account</button>
    <p id="message"></p>
    </form>

    <script src="javascript/signup.js"></script>
</body>

</html>
