<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/results.css">
    <style>
        a{
            text-decoration: none;
        }
        .arrow{
            position: fixed;
            transform:scale(1.15);
            top: 20px;
            left: 20px;
        }
    </style>
</head>

<body>
    <a href="index.html">
        <svg class="arrow" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f">
            <path d="M400-80 0-480l400-400 71 71-329 329 329 329-71 71Z"/>

    </a>

    <div class="container">

        <h1 id="welcomeText">Welcome</h1>

        <!-- Personal Information -->
        <div class="section">
            <h2>Personal Information</h2>

            <div id="personalInfo">
            </div>

            <p class="smallText">
                If any of your personal information changes, please refill the form to update your profile.
            </p>

        </div>


        <!-- Saved Scholarships -->
        <div class="section">

            <h2>Saved Scholarships</h2>

            <div id="savedScholarships">

            </div>

        </div>


        <!-- Comments -->
        <div class="section">

            <h2>Your Comments</h2>

            <div id="userComments">

            </div>

        </div>

    </div>

    <script src="javascript/profile.js"></script>
    <script src="javascript/heart.js"></script>
