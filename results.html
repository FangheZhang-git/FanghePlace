<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarship Results</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/results.css">
    <link rel="stylesheet" href="css/comments.css">
    <link rel="icon" href="image/ScholarMatch.png">

</head>

<body>
    <header class="header">
        <a href="index.html">
            <h1 class="templogo">ScholarMatch</h1>
        </a>
    </header>
    <main class="resultsSection">
        <h2>Matching Scholarship Programs</h2>
        <div id="scholarshipResults"></div>
    </main>

    <div id="google_translate_element" style="display:none;"></div>

    <div id="commentsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeComments()">x</span>

            <h2>Comments</h2>

            <div id="commentsContainer"></div>

            <div class="comment-input-area">
                <textarea id="commentInput" placeholder="Write a comment..."></textarea>
                <button onclick="submitComment()" class="comment-btn">Post Comment</button>
            </div>
        </div>
    </div>


    <script src="javascript/translate.js"></script>
    <script src="javascript/comments.js"></script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script src="javascript/results.js"></script>
    <script src="javascript/heart.js"></script>
    <script src="javascript/checkToken.js"></script>
</body>

</html>
