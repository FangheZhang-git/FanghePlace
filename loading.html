<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading | ScholarMatch</title>
    <link rel="icon" href="image/ScholarMatch.png">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }

        .loading-panel {
            width: min(420px, calc(100% - 32px));
            padding: 36px 28px;
            text-align: center;
            background: #ffffff;
            border: 1px solid #dbe3ee;
            border-radius: 8px;
            box-shadow: 0 18px 50px rgba(31, 41, 55, 0.12);
        }

        .logo {
            width: 72px;
            height: 72px;
            object-fit: contain;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 1.55rem;
            font-weight: 700;
        }

        p {
            margin: 0;
            color: #5b6573;
            line-height: 1.5;
        }

        .spinner {
            width: 42px;
            height: 42px;
            margin: 24px auto 0;
            border: 4px solid #dbe3ee;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <main class="loading-panel">
        <img class="logo" src="image/ScholarMatch.png" alt="ScholarMatch">
        <h1 id="loadingTitle">Loading</h1>
        <p>Getting ScholarMatch ready for you.</p>
        <div class="spinner" aria-label="Loading"></div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const blockedPages = new Set(["loading.html", "login.html", "signup.html"]);
        const requestedNext = params.get("next") || "index.html";
        const message = params.get("message") || "Loading";

        function getSafeNextPage(page) {
            try {
                const url = new URL(page, window.location.href);
                const fileName = url.pathname.split("/").pop() || "index.html";

                if (url.origin !== window.location.origin || blockedPages.has(fileName)) {
                    return "index.html";
                }

                return `${url.pathname}${url.search}${url.hash}`;
            } catch {
                return "index.html";
            }
        }

        const nextPage = getSafeNextPage(requestedNext);

        document.getElementById("loadingTitle").innerText = message;

        function redirectNext() {
            window.location.replace(nextPage);
        }

        setTimeout(redirectNext, 900);

        window.addEventListener("pageshow", event => {
            if (event.persisted) {
                redirectNext();
            }
        });
    </script>
</body>

</html>
