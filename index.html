<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScholarMatch</title>
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/carousel.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/index.css">
</head>

<body>
  <!-- Header -->

  <header class="header">
    <h1 class="logo">ScholarMatch</h1>

    <div class="SEARCH">
      <input id="searchInput" type="search" 
      placeholder="Search scholarships by name" autocomplete="off">
      <button id="barSearch">Search</button>
    </div>

    <div class="buttons">
      <a href="login.html"><button id="login">Log in</button></a>
      <a href="signup.html"><button id="signup">Sign up</button></a>
      <button id="logout" onclick="logout()" style="display: none;">Log Out</button>
    </div>
  </header>

  <!-- WELCOME words -->

  <main id="main">
    <h2 id="welcome">Welcome to ScholarMatch!</h2>
    <h3 id="mission">Our mission is to make scholarship opportunities visible, accessible, and free for every high school student</h3>
    <button id="search-button">Find Scholarships That Match You</button>
  </main>

  <!-- Carousel -->
  <div class="background">
    <!--All pictures from royalty-free websites, no permission needed-->
    <div class="carousel">
      <!--Pictured by Patricia Beatrix Villanueva, from Unsplash website-->
      <img src="carousel/img1.jpg" class="slide active" alt="graduation"> 
      <!--Pictured by John Guccione, from Pexels website-->
      <img src="carousel/img2.jpg" class="slide" alt="moeny easy to receive">
      <!--Pictured by David McBee, from Pexels website-->
      <img src="carousel/img3.jpg" class="slide" alt="Scholarship Support">
      <!--Pictured by Pavel Danilyuk, from Pexels website-->
      <img src="carousel/img4.jpg" class="slide" alt="Academic Success">
      <!--Pictured by Rafay Ansari, from Unsplash website-->
      <img src="carousel/img5.jpg" class="slide" alt="Hard Working">
    </div>
  </div>
  <script src="javascript/carousel.js"></script>
  <script src="javascript/topBar.js"></script>
</body>

</html>
