<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <form id="loginForm">

    <h2>Login</h2>
    <input type="email" class="loginGroup" id="email" placeholder="Email" required />
    <br><br>
    <input type="password" class="loginGroup" id="password" placeholder="Password" required />
    <br><br>
    <button type="submit">Login</button>
    <p id="message"></p>
  </form>
  <script src="javascript/login.js"></script>
</body>
</html>
